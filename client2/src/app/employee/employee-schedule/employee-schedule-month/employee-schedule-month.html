<div class="flexlayout column center">
  <div class="flexlayout row center">
    <div class="movement"
    (click)="changeMonth('down', 'year')">&lt;&lt;</div>
    <div class="movement"
    (click)="changeMonth('down', 'month')">&lt;</div>
    <div class="month">{{monthLabel()}}</div>
    <div class="movement"
    (click)="changeMonth('up', 'month')">&gt;</div>
    <div class="movement"
    (click)="changeMonth('up', 'year')">&gt;&gt;</div>
  </div>
  <div class="flexlayout row center">
    <div class="daycell weekend">SUN</div>
    <div class="daycell weekday">MON</div>
    <div class="daycell weekday">TUE</div>
    <div class="daycell weekday">WED</div>
    <div class="daycell weekday">THU</div>
    <div class="daycell weekday">FRI</div>
    <div class="daycell weekend" >SAT</div>
  </div>
  @for (week of workweeks; track week) {
    <div class="flexlayout row center">
      @for (day of week.getWorkdays(); track day) {
        <app-employee-schedule-month-day
          [workday]="day" [month]="month" ></app-employee-schedule-month-day>
      }
    </div>
  }
</div>
