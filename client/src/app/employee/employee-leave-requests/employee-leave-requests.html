<div class="page">
  <mat-card>
    <mat-card-header style="color: white;">
      <mat-card-title>Employee Leave Request</mat-card-title>
    </mat-card-header>
    <mat-card-content style="margin: 20px;">
      <div class="flexlayout row topcenter flexgap">
        <div class="flexlayout column topcenter flexgap">
          <app-list [width]="200" [height]="300" [list]="requests()"
            (itemSelected)="onSelect($event)" [selectedItem]="selectedItem()"></app-list>
          @if (this.selectedItem() !== '') {
            <div class="flexlayout column topcenter">
              <div class="flexlayout row center" style="width: 100%;color: white;">
                Request Status Info</div>
              <div class="flexlayout row center">
                <div class="flexlayout row center status">Created On</div>
                <div class="flexlayout row center status">{{createdOn()}}</div>
              </div>
              <div class="flexlayout row center">
                <div class="flexlayout row center status">Status</div>
                <div class="flexlayout row center status">{{requestStatus()}}</div>
              </div>
              <div class="flexlayout row center">
                <div class="flexlayout row center status">Approved By</div>
                <div class="flexlayout row center status">{{approvedBy()}}</div>
              </div>
              <div class="flexlayout row center">
                <div class="flexlayout row center status">Approved On</div>
                <div class="flexlayout row center status">{{approvedOn()}}</div>
              </div>
              <div class="flexlayout row center">
                <div class="flexlayout row center status">PTO Hours</div>
                <div class="flexlayout row center status">{{ptoHours()}}</div>
              </div>
              <div class="flexlayout row center">
                <div class="flexlayout row center status">Holiday Hours</div>
                <div class="flexlayout row center status">{{holidayHours()}}</div>
              </div>
            </div>
          }
        </div>
        <app-employee-leave-requests-editor [employee]="employee" 
          [request]="selectedItem()" (changed)="onChanged($event)">
        </app-employee-leave-requests-editor>
      </div>
    </mat-card-content>
  </mat-card>
</div>
