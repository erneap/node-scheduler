<div class="page">
  <mat-card>
    <mat-card-header>
      <mat-card-title style="color: White;">NOT AUTHORIZED</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="flexlayout column center">
        <h3 style="color: salmon;">You are not authorized to access this application.<br/><br/>
          Please contact a supervisor or administrator to check your status.</h3>
        <button mat-raised-button (click)="acknowledge()">I Understand</button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
