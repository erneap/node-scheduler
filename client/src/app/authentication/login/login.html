<div class="page">
  <mat-card>
    <mat-card-header>
      <mat-card-title style="color: White;">User Login</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form class="flexlayout column center" [formGroup]="loginForm">
        <div class="flexlayout row center" style="vertical-align: middle;">
          <mat-icon>email</mat-icon>
          <mat-form-field style="width: 300px;margin-left: 10px;">
            <input matInput placeholder="E-mail"
              formControlName="email">
          </mat-form-field>
        </div>
        <div class="flexlayout row center">
          <mat-icon>vpn_key</mat-icon>
          <mat-form-field style="width: 300px;margin-left: 10px;">
            <input matInput placeholder="Password"
              type="password" formControlName="password">
          </mat-form-field>
        </div>
        <div class="flexlayout row center">
          <button mat-raised-button type="submit" color="accent"
            [disabled]="loginForm.invalid" (click)="login()"
          >Login</button>
        </div>
        <div class="flexlayout row topright"
          style="margin-top: 3px;width: 99%">
          <a (click)="onForgot()" class="forgot">Forgot Password</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
