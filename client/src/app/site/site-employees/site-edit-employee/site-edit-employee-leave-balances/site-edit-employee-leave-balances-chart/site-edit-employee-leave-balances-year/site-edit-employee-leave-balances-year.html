<form [formGroup]="yearForm" class="flexlayout row center">
  <div class="flexlayout column center year">{{balance.year}}</div>
  <div class="flexlayout column center value">
    <input matNativeControl formControlName="annual" class="input"
      (change)="onChange('annual')">
  </div>
  <div class="flexlayout column center value">
    <input matNativeControl formControlName="carry" class="input"
      (change)="onChange('carry')">
  </div>
  <div class="flexlayout column center delete" (click)="onChange('delete')">
    <mat-icon class="icon">delete</mat-icon>
  </div>
</form>
