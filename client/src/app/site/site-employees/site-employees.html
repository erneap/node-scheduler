<div class="flexlayout column topleft view">
  <div class="flexlayout row center" style="width: 100%;">
    <h2 style="color: white;">Site Employees Editor</h2>
    <span class="flex-spacer"></span>
    <div class="flexlayout column center">
      @if (this.siteService.selectedEmployee() !== 'new') {
        <button matIconButton matTooltip="Delete selected employee" 
          (click)="deleteEmployee()">
          <mat-icon class="delete">delete</mat-icon>
        </button>
      }
    </div>
  </div>
  <div class="flexlayout row topleft" style="width: 100%;">
    <div class="flexlayout column center" style="margin-left: 10px;">
      <h3 style="color: white;">List of Employees</h3>
      <app-list [height]="getEmployeeListHeight()" [width]="250"
        [list]="siteService.siteEmployeeList()" (itemSelected)="onSelect($event)"
        [selectedItem]="siteService.selectedEmployee()">
      </app-list>
      <div class="flexlayout row center" style="width: 100%;">
        <mat-checkbox style="color: white;"
          (change)="onShowAll($event.checked)">Show All Employees</mat-checkbox>
      </div>
    </div>
    <div class="flexlayout column topcenter router">
      <router-outlet style="width: 100%; height: 100%;"></router-outlet>
    </div>
  </div>
</div>
