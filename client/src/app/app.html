<main>
  <mat-toolbar color="accent" style="border: solid 1px black;">
    @if (this.authService.isLoggedIn()) {
      <button matIconButton (click)="toggleMenu()">
        <mat-icon>menu</mat-icon>
      </button>
    }
    <mat-icon svgIcon="calendar"></mat-icon>
    <a mat-button><H1>Osan Scheduler</H1></a>
    <span class="flex-spacer"></span>
    @if (this.authService.isLoggedIn()) {
      <span class="user">
      {{this.authService.user().firstName}}</span>
    }
    @if (!this.authService.isLoggedIn()) {
      <button mat-icon-button
        matTooltip="Show Login Form" routerLink="home">
        <mat-icon>lock_open</mat-icon>
      </button>
    }
    @if (this.authService.isLoggedIn()) {
      <button mat-icon-button
        matTooltip="Log out the current user">
        <mat-icon>lock</mat-icon>
      </button>
    }
    <button mat-icon-button
      matTooltip="Get Assistance">
      <mat-icon>help</mat-icon>
    </button>
  </mat-toolbar>
  <mat-sidenav-container class="app-sidenav-container"
    [class.marginTop.px]="56">
    <mat-sidenav #sidenav [opened]="showMenu"
    style="border: solid 1px black;">
      Menu
    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet class="app-container"></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
  <div class="statusbar">
    <div class="metrics" >Go To Metrics</div>
    <div class="message">
      {{this.authService.message()}}
    </div>
    <div class="flex-spacer"></div>
    <div class="notices">
      <!--   TODO
      @if (this.msgService.showAlerts) {
        <button mat-icon-button
          matTooltip="Notifications Available"
          routerLink="/notifications">
          <mat-icon class="warning-icon">notification_important</mat-icon>
        </button>
      } -->
    </div>
    <div class="version">
      v{{app_version}}
    </div>
  </div>
</main>
