<h2 mat-dialog-title>{{data.title}}</h2>
<mat-dialog-content>
  {{data.message}}
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton="filled" mat-dialog-close="no">{{getNoButtonTitle()}}</button>
  <button matButton="filled" mat-dialog-close="yes" cdkFocusInitial>
    {{getYesButtonTitle()}}</button>
</mat-dialog-actions>
